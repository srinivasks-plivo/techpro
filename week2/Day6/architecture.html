<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background: #0f1117;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .container {
    width: 1200px;
    padding: 40px;
  }
  h1 {
    color: #fff;
    text-align: center;
    font-size: 28px;
    margin-bottom: 8px;
  }
  .subtitle {
    color: #8b8fa3;
    text-align: center;
    font-size: 14px;
    margin-bottom: 50px;
  }
  svg {
    width: 100%;
    height: auto;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Plivo AI Receptionist — Architecture</h1>
  <p class="subtitle">Day 6: Pipecat + Plivo + Railway Deployment</p>

  <svg viewBox="0 0 1100 520" xmlns="http://www.w3.org/2000/svg">
    <!-- Phone -->
    <rect x="20" y="190" width="120" height="140" rx="16" fill="#1a1d2e" stroke="#3b3f54" stroke-width="2"/>
    <text x="80" y="245" text-anchor="middle" fill="#fff" font-size="30">📱</text>
    <text x="80" y="275" text-anchor="middle" fill="#c4c7d4" font-size="12" font-weight="600">Caller</text>
    <text x="80" y="295" text-anchor="middle" fill="#6b7080" font-size="10">Dials +1 785...</text>

    <!-- Arrow 1 -->
    <line x1="140" y1="260" x2="195" y2="260" stroke="#4a6cf7" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="167" y="250" text-anchor="middle" fill="#6b7080" font-size="9">PSTN</text>

    <!-- Plivo -->
    <rect x="195" y="195" width="130" height="130" rx="12" fill="#1a1d2e" stroke="#22c55e" stroke-width="2"/>
    <text x="260" y="245" text-anchor="middle" fill="#22c55e" font-size="16" font-weight="700">PLIVO</text>
    <text x="260" y="268" text-anchor="middle" fill="#8b8fa3" font-size="10">Telephony</text>
    <text x="260" y="283" text-anchor="middle" fill="#6b7080" font-size="9">POST /answer</text>
    <text x="260" y="298" text-anchor="middle" fill="#6b7080" font-size="9">WebSocket audio</text>

    <!-- Arrow 2 -->
    <line x1="325" y1="260" x2="385" y2="260" stroke="#4a6cf7" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="355" y="250" text-anchor="middle" fill="#6b7080" font-size="9">WSS</text>

    <!-- Railway Box -->
    <rect x="385" y="60" width="420" height="400" rx="16" fill="#111325" stroke="#4a6cf7" stroke-width="2"/>
    <text x="595" y="90" text-anchor="middle" fill="#4a6cf7" font-size="14" font-weight="700">RAILWAY</text>
    <text x="595" y="108" text-anchor="middle" fill="#6b7080" font-size="10">humble-nourishment.up.railway.app</text>

    <!-- FastAPI -->
    <rect x="415" y="125" width="165" height="55" rx="8" fill="#1a2744" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="497" y="150" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="600">FastAPI Server</text>
    <text x="497" y="168" text-anchor="middle" fill="#6b7080" font-size="9">/answer  /health  /ws  /calls</text>

    <!-- Pipecat Pipeline -->
    <rect x="415" y="200" width="370" height="230" rx="10" fill="#161830" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="600" y="225" text-anchor="middle" fill="#8b5cf6" font-size="13" font-weight="700">Pipecat Pipeline</text>

    <!-- VAD -->
    <rect x="435" y="240" width="100" height="42" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="485" y="258" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">Silero VAD</text>
    <text x="485" y="273" text-anchor="middle" fill="#6b7080" font-size="8">Voice Detection</text>

    <!-- STT -->
    <rect x="555" y="240" width="100" height="42" rx="6" fill="#1e293b" stroke="#06b6d4" stroke-width="1.2"/>
    <text x="605" y="258" text-anchor="middle" fill="#06b6d4" font-size="10" font-weight="600">Deepgram</text>
    <text x="605" y="273" text-anchor="middle" fill="#6b7080" font-size="8">STT</text>

    <!-- Arrow VAD to STT -->
    <line x1="535" y1="261" x2="555" y2="261" stroke="#6b7080" stroke-width="1.2" marker-end="url(#arrow2)"/>

    <!-- LLM -->
    <rect x="435" y="300" width="100" height="42" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1.2"/>
    <text x="485" y="318" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">OpenAI</text>
    <text x="485" y="333" text-anchor="middle" fill="#6b7080" font-size="8">GPT-4.1-mini</text>

    <!-- Arrow STT to LLM -->
    <line x1="605" y1="282" x2="605" y2="292" stroke="#6b7080" stroke-width="1.2"/>
    <line x1="605" y1="292" x2="485" y2="292" stroke="#6b7080" stroke-width="1.2"/>
    <line x1="485" y1="292" x2="485" y2="300" stroke="#6b7080" stroke-width="1.2" marker-end="url(#arrow2)"/>

    <!-- TTS -->
    <rect x="555" y="300" width="100" height="42" rx="6" fill="#1e293b" stroke="#a855f7" stroke-width="1.2"/>
    <text x="605" y="318" text-anchor="middle" fill="#a855f7" font-size="10" font-weight="600">ElevenLabs</text>
    <text x="605" y="333" text-anchor="middle" fill="#6b7080" font-size="8">TTS</text>

    <!-- Arrow LLM to TTS -->
    <line x1="535" y1="321" x2="555" y2="321" stroke="#6b7080" stroke-width="1.2" marker-end="url(#arrow2)"/>

    <!-- Function Calling -->
    <rect x="675" y="240" width="95" height="102" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.2"/>
    <text x="722" y="260" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600">Functions</text>
    <text x="722" y="278" text-anchor="middle" fill="#6b7080" font-size="8">get_hours()</text>
    <text x="722" y="292" text-anchor="middle" fill="#6b7080" font-size="8">get_location()</text>
    <text x="722" y="306" text-anchor="middle" fill="#6b7080" font-size="8">transfer_sales()</text>
    <text x="722" y="320" text-anchor="middle" fill="#6b7080" font-size="8">transfer_support()</text>

    <!-- Arrow LLM to Functions -->
    <line x1="535" y1="310" x2="545" y2="310" stroke="#6b7080" stroke-width="1"/>
    <line x1="545" y1="310" x2="545" y2="355" stroke="#6b7080" stroke-width="1"/>
    <line x1="545" y1="355" x2="722" y2="355" stroke="#6b7080" stroke-width="1"/>
    <line x1="722" y1="355" x2="722" y2="342" stroke="#6b7080" stroke-width="1" marker-end="url(#arrow2)"/>

    <!-- Warm Start label -->
    <rect x="435" y="365" width="335" height="48" rx="6" fill="#0f1117" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4"/>
    <text x="602" y="385" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">⚡ Warm-Start</text>
    <text x="602" y="400" text-anchor="middle" fill="#6b7080" font-size="9">VAD model + AI services pre-loaded at startup</text>

    <!-- Arrow 3 to DB -->
    <line x1="805" y1="260" x2="860" y2="260" stroke="#4a6cf7" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Neon Postgres -->
    <rect x="860" y="190" width="130" height="140" rx="12" fill="#1a1d2e" stroke="#06b6d4" stroke-width="2"/>
    <text x="925" y="240" text-anchor="middle" fill="#06b6d4" font-size="14" font-weight="700">Neon</text>
    <text x="925" y="258" text-anchor="middle" fill="#8b8fa3" font-size="10">Postgres</text>
    <line x1="880" y1="272" x2="970" y2="272" stroke="#2a2e42" stroke-width="1"/>
    <text x="925" y="290" text-anchor="middle" fill="#6b7080" font-size="9">caller_number</text>
    <text x="925" y="304" text-anchor="middle" fill="#6b7080" font-size="9">transcript</text>
    <text x="925" y="318" text-anchor="middle" fill="#6b7080" font-size="9">detected_intent</text>

    <!-- Arrow definitions -->
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a6cf7"/>
      </marker>
      <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7080"/>
      </marker>
    </defs>
  </svg>
</div>
</body>
</html>
